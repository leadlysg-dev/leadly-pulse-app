<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AdPulse — log in</title>
<style>
  :root { --ink:#0b0b0b; --muted:#5f5e5a; --bg:#fcfcfb; --border:#e1e0d9; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--ink); }
  .wrap { max-width: 360px; margin: 0 auto; padding: 72px 24px; }
  h1 { font-size: 20px; margin: 0 0 20px; text-align:center; }
  label { font-size: 13px; color: var(--muted); display:block; margin: 14px 0 4px; }
  input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
  button { width:100%; margin-top:20px; padding:10px; border:none; border-radius:8px; background:var(--ink); color:#fff; font-size:14px; font-weight:500; cursor:pointer; }
  .toggle { text-align:center; margin-top:16px; font-size:13px; color:var(--muted); }
  .toggle a { color: var(--ink); cursor:pointer; text-decoration:underline; }
  .error { color:#a32d2d; font-size:13px; margin-top:10px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">Log in to AdPulse</h1>
  <form id="form">
    <label>Email</label>
    <input type="email" id="email" required />
    <label>Password</label>
    <input type="password" id="password" required minlength="8" />
    <button type="submit" id="submitBtn">Log in</button>
  </form>
  <p class="error" id="error"></p>
  <p class="toggle" id="toggle">New here? <a onclick="switchMode()">Create an account</a></p>
</div>

<script>
let mode = 'login';
function switchMode() {
  mode = mode === 'login' ? 'signup' : 'login';
  document.getElementById('title').textContent = mode === 'login' ? 'Log in to AdPulse' : 'Create your AdPulse account';
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'Log in' : 'Create account';
  document.getElementById('toggle').innerHTML = mode === 'login'
    ? 'New here? <a onclick="switchMode()">Create an account</a>'
    : 'Already have an account? <a onclick="switchMode()">Log in</a>';
  document.getElementById('error').textContent = '';
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';

  const endpoint = mode === 'login' ? '/.netlify/functions/login' : '/.netlify/functions/signup';
  const res = await fetch(endpoint, { method: 'POST', body: JSON.stringify({ email, password }) });
  const data = await res.json();

  if (!res.ok) {
    errorEl.textContent = data.error || 'Something went wrong.';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const next = params.get('next');
  if (next === 'connect-meta') window.location.href = '/.netlify/functions/auth-meta';
  else if (next === 'connect-google') window.location.href = '/.netlify/functions/auth-google';
  else window.location.href = '/dashboard.html';
});
</script>
</body>
</html>
