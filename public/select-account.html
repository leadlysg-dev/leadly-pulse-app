<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pick your ad account</title>
<style>
  :root { --ink:#0b0b0b; --muted:#5f5e5a; --bg:#fcfcfb; --border:#e1e0d9; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; padding: 56px 24px; }
  h1 { font-size: 18px; margin: 0 0 6px; }
  p.sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
  .option { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; cursor:pointer; }
  .option:hover { border-color:#b4b2a9; }
  .option.selected { border-color:var(--ink); background:#f1efe8; }
  .option .name { font-size:14px; }
  .option .id { font-size:12px; color:var(--muted); }
  button { margin-top:10px; padding:10px 16px; border:none; border-radius:8px; background:var(--ink); color:#fff; font-size:14px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="heading">Which ad account should we track?</h1>
  <p class="sub" id="sub">You manage more than one — pick the one you want on your dashboard. You can change this later.</p>
  <div id="list"></div>
  <button id="saveBtn" disabled>Confirm selection</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const provider = params.get('provider') || 'meta';
let selectedId = null;

async function load() {
  const res = await fetch('/.netlify/functions/list-accounts');
  const data = await res.json();
  const info = data[provider];
  document.getElementById('heading').textContent = `Which ${provider === 'meta' ? 'Meta' : 'Google'} ad account should we track?`;

  const list = document.getElementById('list');
  list.innerHTML = '';
  info.adAccounts.forEach((acc) => {
    const el = document.createElement('div');
    el.className = 'option';
    el.innerHTML = `<span class="name">${acc.name}</span><span class="id">${acc.id}</span>`;
    el.onclick = () => {
      selectedId = acc.id;
      document.querySelectorAll('.option').forEach((o) => o.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('saveBtn').disabled = false;
    };
    list.appendChild(el);
  });
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  await fetch('/.netlify/functions/select-account', {
    method: 'POST',
    body: JSON.stringify({ provider, accountId: selectedId })
  });
  window.location.href = '/dashboard.html?connected=' + provider;
});

load();
</script>
</body>
</html>
